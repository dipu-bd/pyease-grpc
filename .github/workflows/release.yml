name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  release:
    needs: [lint]
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Released artifacts by ncipollo/release-action
      id-token: write # PyPI Trusted Publishing (OIDC) via gh-action-pypi-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Python 3.12
        uses: astral-sh/setup-uv@v7
        with:
          python-version: '3.12'
          enable-cache: true

      - name: Build package
        run: uv build

      - name: Release Artifacts
        uses: ncipollo/release-action@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          artifacts: 'dist/*.whl'
          allowUpdates: true
          artifactErrorsFailBuild: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: PyPI Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        if: github.repository == 'dipu-bd/pyease-grpc'
        env:
          verbose: true
          print-hash: true
          password: ${{ secrets.PYPI_API_TOKEN }}
